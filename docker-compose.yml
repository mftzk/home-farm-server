services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_NAME: "Light Monitor"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:bGIbq7rOviZJpPsJgkwn3iCktltJ7JLkNH0N5dpgztQ=
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: esp8266_light
      DB_USERNAME: root
      DB_PASSWORD: lightpass
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      ESP_IP: 192.168.1.100        # IP ESP8266 sensor cahaya
      ESP_RELAY_IP: 192.168.1.101  # IP ESP8266 relay control
      ESP_TIMEOUT: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: lightpass
      MARIADB_DATABASE: esp8266_light
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
